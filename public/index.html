<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Registro de Ubicación de Clientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Pantalla de selección de archivo Excel -->
    <div id="selectorArchivo" class="container selector-container">
        <div class="card">
            <h2>📁 Archivo Excel</h2>
            <p>Selecciona una opción para comenzar:</p>
            <button id="btnCargarArchivo" class="btn-opcion">📂 Cargar Archivo Excel</button>
            <button id="btnCrearNuevo" class="btn-opcion">🆕 Crear Archivo Nuevo</button>
            <input type="file" id="inputFileExcel" accept=".xlsx" style="display: none;">
            <div id="mensajeInicial" class="mensaje"></div>
        </div>
    </div>

    <!-- Interfaz principal (oculta inicialmente) -->
    <div id="appPrincipal" class="container" style="display: none;">
        <h1>Registro de Visitas</h1>
        
        <div class="card">
            <label for="cliente">Nombre del Cliente</label>
            <select id="cliente" required>
                <option value="">-- Selecciona un cliente --</option>
            </select>
        </div>

        <div class="card">
            <label for="visita">Frecuencia de Visita</label>
            <select id="visita" required>
                <option value="">-- Elige una opción --</option>
                <option value="Semanal">Semanal</option>
                <option value="Quincenal">Quincenal</option>
            </select>
        </div>

        <div class="card">
            <label>Ubicación GPS</label>
            <button id="btnUbicacion" class="btn-gps">📍 Capturar mi ubicación actual</button>
            <div id="ubicacionMostrada" class="ubicacion-info">No capturada</div>
        </div>

        <button id="btnGuardar" class="btn-guardar">💾 Guardar registro en Excel</button>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
