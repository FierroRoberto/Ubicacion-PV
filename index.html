<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#060a16"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PdV Visitas"/>
  <title>Ubicacion de Punto de Venta</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192x192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
  /* ─── Reset ──────────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  html { -webkit-text-size-adjust: 100%; }

  /* ─── Design Tokens ──────────────────────────────────── */
  :root {
    /* Palette — deep obsidian + aurora gold */
    --ink:         #060a16;
    --ink2:        #0b1020;
    --ink3:        #101628;
    --glass:       rgba(255,255,255,0.028);
    --glass2:      rgba(255,255,255,0.055);
    --glass3:      rgba(255,255,255,0.09);
    --rim:         rgba(255,255,255,0.065);
    --rim2:        rgba(255,255,255,0.12);
    --rim3:        rgba(255,255,255,0.18);

    /* Gold spectrum */
    --gold:        #dca020;
    --gold-hi:     #f0be50;
    --gold-lo:     rgba(220,160,32,0.09);
    --gold-md:     rgba(220,160,32,0.20);
    --gold-glow:   rgba(220,160,32,0.30);

    /* Semantic */
    --text:        #bfcde8;
    --text-hi:     #dce8f8;
    --text-lo:     #4e5e7e;
    --ok:          #2dd4a4;
    --ok-lo:       rgba(45,212,164,0.08);
    --ok-rim:      rgba(45,212,164,0.28);
    --err:         #f07070;
    --err-lo:      rgba(240,112,112,0.08);
    --err-rim:     rgba(240,112,112,0.28);

    /* Easing — exponential out + snap */
    --ease-out:    cubic-bezier(0.16,1,0.3,1);
    --ease-inout:  cubic-bezier(0.77,0,0.175,1);
    --ease-snap:   cubic-bezier(0.34,1.48,0.64,1);
    --ease-swift:  cubic-bezier(0.23,1,0.32,1);

    /* Spacing */
    --gap:   9px;
    --pad:   14px;
    --r:     14px;
    --r-sm:  10px;
  }

  /* ─── Body ───────────────────────────────────────────── */
  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100svh;
    overflow-x: hidden;
  }

  /* Aurora background layers */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 100% 50% at 50% -8%,  rgba(220,160,32,0.085) 0%, transparent 60%),
      radial-gradient(ellipse  55% 35% at 92%  85%,  rgba(80,100,200,0.05)  0%, transparent 55%),
      radial-gradient(ellipse  45% 28% at  4%  65%,  rgba(220,160,32,0.04)  0%, transparent 55%),
      radial-gradient(ellipse  70% 40% at 50% 110%,  rgba(40,180,140,0.03)  0%, transparent 60%);
  }

  /* Dot grid */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black, transparent);
  }

  /* ─── App shell ──────────────────────────────────────── */
  .app {
    position: relative; z-index: 1;
    max-width: 400px;
    margin: 0 auto;
    padding: 0 14px 40px;
    display: flex; flex-direction: column;
    min-height: 100svh;
  }

  /* ─── Header ─────────────────────────────────────────── */
  header {
    padding: 26px 0 16px;
    text-align: center;
    border-bottom: 1px solid var(--rim);
    margin-bottom: 14px;
    animation: revealDown 550ms var(--ease-out) both;
  }

  .h-eyebrow {
    font-size: 9.5px; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 7px;
    opacity: 0.88;
    animation: revealDown 550ms 30ms var(--ease-out) both;
  }

  .h-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px; font-weight: 400;
    line-height: 1.12;
    color: var(--text-hi);
    letter-spacing: -0.2px;
    text-wrap: balance;
    /* Gold shimmer on the title */
    background: linear-gradient(135deg, #e8d8a8 0%, #dca020 45%, #f0d070 70%, #c08010 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: revealDown 550ms 60ms var(--ease-out) both;
  }

  .h-sub {
    font-size: 13px; font-weight: 300;
    color: var(--text-lo);
    margin-top: 6px;
    letter-spacing: 0.5px;
    animation: revealDown 550ms 90ms var(--ease-out) both;
  }

  /* ─── Thin gold rule under header ───────────────────── */
  .gold-line {
    width: 36px; height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 0;
    border-radius: 2px;
    opacity: 0.5;
  }

  /* ─── Toast ──────────────────────────────────────────── */
  #toast {
    display: flex; align-items: center; gap: 9px;
    background: var(--glass);
    border: 1px solid var(--rim);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border-radius: var(--r-sm);
    padding: 9px 13px;
    font-size: 12.5px; font-weight: 400;
    color: var(--text-lo);
    margin-bottom: 12px;
    min-height: 38px;
    transition:
      background 260ms var(--ease-out),
      border-color 260ms var(--ease-out),
      color 260ms var(--ease-out);
    animation: slideUp 500ms 110ms var(--ease-out) both;
  }

  #toast.ok   { background: var(--ok-lo);  border-color: var(--ok-rim);  color: var(--ok); }
  #toast.err  { background: var(--err-lo); border-color: var(--err-rim); color: var(--err); }
  #toast.load { background: var(--gold-lo); border-color: var(--gold-md); color: var(--gold); }

  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  #toast.ok .pulse-dot, #toast.load .pulse-dot {
    animation: pulseDot 1.8s ease-in-out infinite;
  }
  @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(0.7)} }

  /* ─── Section label ──────────────────────────────────── */
  .label {
    display: flex; align-items: center; gap: 7px;
    font-size: 9px; font-weight: 500;
    letter-spacing: 1.9px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 7px;
    opacity: 0.88;
  }

  .label-num {
    width: 17px; height: 17px;
    border: 1px solid var(--gold-md);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8.5px; color: var(--gold);
    background: var(--gold-lo);
    flex-shrink: 0;
  }

  /* ─── Cards ──────────────────────────────────────────── */
  .card {
    background: var(--glass);
    border: 1px solid var(--rim);
    border-radius: var(--r);
    padding: var(--pad);
    margin-bottom: var(--gap);
    backdrop-filter: blur(10px) saturate(1.2);
    -webkit-backdrop-filter: blur(10px) saturate(1.2);
    transition:
      border-color 200ms var(--ease-out),
      box-shadow 200ms var(--ease-out);
    will-change: transform;
    position: relative;
    overflow: hidden;
  }

  /* Subtle inner highlight top edge */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
    pointer-events: none;
  }

  .card:focus-within {
    border-color: var(--gold-md);
    box-shadow: 0 0 0 1px var(--gold-md) inset, 0 4px 24px rgba(0,0,0,0.3);
  }

  /* Stagger entrance */
  .card:nth-of-type(1) { animation: slideUp 450ms 120ms var(--ease-out) both; }
  .card:nth-of-type(2) { animation: slideUp 450ms 165ms var(--ease-out) both; }
  .card:nth-of-type(3) { animation: slideUp 450ms 210ms var(--ease-out) both; }
  .card:nth-of-type(4) { animation: slideUp 450ms 255ms var(--ease-out) both; }

  /* ─── File zone ──────────────────────────────────────── */
  .file-zone {
    border: 1px dashed var(--rim2);
    border-radius: var(--r-sm);
    padding: 16px 14px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition:
      border-color 200ms var(--ease-out),
      background 200ms var(--ease-out),
      transform 120ms var(--ease-snap);
  }

  .file-zone:hover  { border-color: var(--gold); background: var(--gold-lo); }
  .file-zone:active { transform: scale(0.985); }

  .file-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }

  .fz-icon { font-size: 22px; margin-bottom: 5px; }
  .fz-text { font-size: 12.5px; line-height: 1.5; color: var(--text-lo); }
  .fz-text strong { color: var(--text); font-weight: 400; }

  .file-ok {
    display: flex; align-items: center; gap: 8px;
    background: var(--ok-lo); border: 1px solid var(--ok-rim);
    border-radius: 9px; padding: 9px 12px;
    font-size: 12px; color: var(--ok);
    margin-top: 9px;
    animation: slideUp 280ms var(--ease-snap) both;
  }

  /* ─── Select ─────────────────────────────────────────── */
  select {
    width: 100%;
    background: var(--glass2);
    border: 1px solid var(--rim);
    border-radius: var(--r-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 300;
    padding: 11px 38px 11px 13px;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='11' height='7' viewBox='0 0 11 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4.5 5L10 1' stroke='%234e5e7e' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 13px center;
    cursor: pointer;
    transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
  }

  select:focus {
    outline: none;
    border-color: var(--gold-md);
    box-shadow: 0 0 0 3px var(--gold-lo);
  }
  select:disabled { opacity: 0.3; cursor: not-allowed; }
  select option { background: #0b1020; }

  /* ─── Toggle buttons (Semanal/Quincenal) ─────────────── */
  .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .tog {
    background: var(--glass2);
    border: 1px solid var(--rim);
    border-radius: var(--r-sm);
    color: var(--text-lo);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    padding: 13px 10px;
    cursor: pointer; text-align: center;
    transition:
      border-color 160ms var(--ease-out),
      color 160ms var(--ease-out),
      background 160ms var(--ease-out),
      transform 130ms var(--ease-snap),
      box-shadow 160ms var(--ease-out);
    user-select: none;
    position: relative; overflow: hidden;
  }

  /* ripple layer */
  .tog::after {
    content: '';
    position: absolute; inset: 0; border-radius: inherit;
    background: radial-gradient(circle at 50% 50%, rgba(220,160,32,0.18), transparent 70%);
    opacity: 0; transition: opacity 200ms var(--ease-out);
  }

  .tog:active { transform: scale(0.95); }
  .tog:active::after { opacity: 1; }

  .tog.on {
    border-color: var(--gold-md);
    background: var(--gold-lo);
    color: var(--gold-hi);
    box-shadow: 0 0 14px var(--gold-lo) inset;
  }

  /* ─── GPS readout ────────────────────────────────────── */
  .gps-box {
    background: var(--glass2);
    border: 1px solid var(--rim);
    border-radius: var(--r-sm);
    padding: 10px 13px;
    font-size: 12px; font-family: 'Courier New', monospace;
    color: var(--text-lo);
    margin-bottom: 9px;
    min-height: 40px;
    display: flex; align-items: center; gap: 8px;
    word-break: break-all;
    transition:
      border-color 240ms var(--ease-out),
      color 240ms var(--ease-out),
      background 240ms var(--ease-out),
      box-shadow 240ms var(--ease-out);
  }

  .gps-box.captured {
    color: var(--ok);
    border-color: var(--ok-rim);
    background: var(--ok-lo);
    box-shadow: 0 0 12px rgba(45,212,164,0.06) inset;
  }

  /* ─── Ghost button ───────────────────────────────────── */
  .btn-ghost {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--rim);
    border-radius: var(--r-sm);
    color: var(--text-lo);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    padding: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition:
      border-color 160ms var(--ease-out),
      color 160ms var(--ease-out),
      transform 120ms var(--ease-snap);
    user-select: none;
  }

  @media (hover: hover) and (pointer: fine) {
    .btn-ghost:hover { border-color: var(--rim2); color: var(--text); }
  }
  .btn-ghost:active { transform: scale(0.97); }
  .btn-ghost:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }

  /* ─── Action row (2 primary buttons) ────────────────── */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    margin-bottom: 9px;
    animation: slideUp 450ms 300ms var(--ease-out) both;
  }

  /* ─── Primary button ─────────────────────────────────── */
  .btn-primary {
    position: relative; overflow: hidden;
    background: linear-gradient(145deg, #d9a020 0%, #b07010 100%);
    border: 1px solid rgba(220,160,32,0.35);
    border-radius: var(--r-sm);
    color: #0a0c10;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.2px;
    padding: 14px 12px;
    cursor: pointer;
    transition:
      transform 140ms var(--ease-snap),
      box-shadow 160ms var(--ease-out),
      opacity 150ms;
    user-select: none;
  }

  /* shimmer sweep */
  .btn-primary::before {
    content: '';
    position: absolute; top: 0; left: -80%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: skewX(-18deg);
  }

  .btn-primary:not(:disabled):hover::before {
    animation: shimmer 500ms var(--ease-out) forwards;
  }

  @keyframes shimmer {
    from { left: -80%; }
    to   { left: 160%; }
  }

  @media (hover: hover) and (pointer: fine) {
    .btn-primary:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(220,160,32,0.35);
    }
  }
  .btn-primary:active:not(:disabled) { transform: scale(0.965); box-shadow: none; }
  .btn-primary:disabled { opacity: 0.32; cursor: not-allowed; }

  /* ─── Secondary button (Descargar) ──────────────────── */
  .btn-secondary {
    position: relative; overflow: hidden;
    background: var(--glass2);
    border: 1px solid var(--rim2);
    border-radius: var(--r-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    padding: 14px 12px;
    cursor: pointer;
    transition:
      border-color 160ms var(--ease-out),
      color 160ms var(--ease-out),
      transform 130ms var(--ease-snap),
      box-shadow 160ms var(--ease-out);
    user-select: none;
  }

  @media (hover: hover) and (pointer: fine) {
    .btn-secondary:not(:disabled):hover {
      border-color: var(--gold-md);
      color: var(--gold-hi);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
  }
  .btn-secondary:active:not(:disabled) { transform: scale(0.965); }
  .btn-secondary:disabled { opacity: 0.28; cursor: not-allowed; }

  /* ─── History ────────────────────────────────────────── */
  .hist-wrap {
    animation: slideUp 350ms var(--ease-out) both;
    margin-top: 4px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rim2) 30%, var(--rim2) 70%, transparent);
    margin: 12px 0 10px;
  }

  .hist-row {
    background: var(--glass);
    border: 1px solid var(--rim);
    border-radius: var(--r-sm);
    padding: 9px 12px;
    margin-bottom: 7px;
    animation: slideUp 220ms var(--ease-out) both;
    transition: border-color 160ms var(--ease-out);
  }

  @media (hover: hover) and (pointer: fine) {
    .hist-row:hover { border-color: var(--rim2); }
  }

  .hist-name { font-size: 13px; font-weight: 400; color: var(--text); margin-bottom: 3px; }
  .hist-meta { font-size: 11px; color: var(--text-lo); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

  .badge {
    font-size: 9.5px; font-weight: 500; letter-spacing: 0.3px;
    padding: 2px 7px; border-radius: 4px;
    background: var(--gold-lo);
    color: var(--gold);
    border: 1px solid var(--gold-md);
  }

  /* ─── Spinner ────────────────────────────────────────── */
  .spin {
    width: 13px; height: 13px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: rotate 0.55s linear infinite;
    display: inline-block;
  }

  /* ─── Footer ─────────────────────────────────────────── */
  footer {
    margin-top: auto; padding-top: 20px;
    text-align: center;
    font-size: 10.5px; font-weight: 300;
    color: var(--text-lo);
    opacity: 0.42;
    letter-spacing: 0.4px;
    animation: slideUp 450ms 360ms var(--ease-out) both;
  }

  /* ─── Keyframes ──────────────────────────────────────── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes revealDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes rotate { to { transform: rotate(360deg); } }

  @keyframes successPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .pop { animation: successPop 350ms var(--ease-snap); }

  /* ─── Reduced motion ─────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 1ms !important;
      transition-duration: 50ms !important;
    }
  }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header (centrado) ────────────────────────────── -->
  <header>
    <div class="h-eyebrow">Sistema de Registro</div>
    <div class="h-title">Ubicacion de Punto de Venta</div>
    <div class="h-sub">Registro de visitas</div>
    <div class="gold-line" style="margin-top:14px"></div>
  </header>

  <!-- ── Toast ────────────────────────────────────────── -->
  <div id="toast"><div class="pulse-dot"></div><span id="toastMsg">Carga el archivo Excel para comenzar</span></div>

  <!-- ── Card 0: Archivo Excel ────────────────────────── -->
  <div class="card">
    <div class="label">📂 Archivo Excel</div>
    <div class="file-zone" id="fileZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="cargarExcel(event)"/>
      <div class="fz-icon">📊</div>
      <div class="fz-text"><strong>Selecciona ubicacion.xlsx</strong><br>Toca aquí para buscar el archivo</div>
    </div>
    <div class="file-ok" id="fileOk" style="display:none">
      ✓ <span id="fileInfo">—</span>
    </div>
  </div>

  <!-- ── Card 1: Cliente ───────────────────────────────── -->
  <div class="card">
    <div class="label"><span class="label-num">1</span> Nombre Cliente</div>
    <select id="selCliente" disabled onchange="checkForm()">
      <option value="">— Selecciona un cliente —</option>
    </select>
  </div>

  <!-- ── Card 2: Visita ────────────────────────────────── -->
  <div class="card">
    <div class="label"><span class="label-num">2</span> Visita al Cliente</div>
    <div class="toggle-row">
      <button class="tog" data-val="Semanal"   onclick="elegirVisita(this)">📅 Semanal</button>
      <button class="tog" data-val="Quincenal" onclick="elegirVisita(this)">🗓 Quincenal</button>
    </div>
  </div>

  <!-- ── Card 3: GPS ───────────────────────────────────── -->
  <div class="card">
    <div class="label"><span class="label-num">3</span> Ubicación GPS</div>
    <div class="gps-box" id="gpsBox">
      <span style="flex-shrink:0">📍</span>
      <span id="gpsTxt">Sin capturar</span>
    </div>
    <button class="btn-ghost" id="btnGps" onclick="capturarGPS()">
      <span>📡</span> Capturar ubicación actual
    </button>
  </div>

  <!-- ── Botones de acción (2) ─────────────────────────── -->
  <div class="action-row">
    <button class="btn-primary" id="btnGuardar" onclick="guardar()" disabled>
      💾 Guardar Excel
    </button>
    <button class="btn-secondary" id="btnDl" onclick="descargar()" disabled>
      ↓ Descargar Excel
    </button>
  </div>

  <!-- ── Historial ─────────────────────────────────────── -->
  <div class="hist-wrap" id="histWrap" style="display:none">
    <div class="divider"></div>
    <div class="label">Guardados esta sesión</div>
    <div id="histList"></div>
  </div>

  <!-- ── Footer ───────────────────────────────────────── -->
  <footer>Por Roberto Fierro A.</footer>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   Estado global
═══════════════════════════════════════════════════════ */
let wb        = null;   // workbook SheetJS en memoria
let filas     = [];     // array de filas del Excel
let visitaSel = '';     // "Semanal" o "Quincenal"
let gpsVal    = '';     // "lat,lng"
let hist      = [];     // historial visual de la sesión
let fileName  = 'ubicacion.xlsx'; // nombre del archivo cargado

/* ═══════════════════════════════════════════════════════
   Toast / estado visual
═══════════════════════════════════════════════════════ */
function toast(msg, tipo = '') {
  const el = document.getElementById('toast');
  el.className = tipo;
  document.getElementById('toastMsg').textContent = msg;
}

/* ═══════════════════════════════════════════════════════
   0 · Cargar Excel desde el dispositivo
═══════════════════════════════════════════════════════ */
function cargarExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  fileName = file.name; // guardar nombre original
  toast('Leyendo archivo…', 'load');

  const reader = new FileReader();
  reader.onload = ev => {
    try {
      wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      filas = XLSX.utils.sheet_to_json(ws, { defval: '' });

      // Poblar el selector de clientes
      const sel = document.getElementById('selCliente');
      sel.innerHTML = '<option value="">— Selecciona un cliente —</option>';
      filas.forEach((f, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = f['Nombre Cliente'] || `Fila ${i + 1}`;
        sel.appendChild(opt);
      });
      sel.disabled = false;

      // Mostrar confirmación de carga
      document.getElementById('fileOk').style.display  = 'flex';
      document.getElementById('fileInfo').textContent  = `${file.name} · ${filas.length} clientes`;
      document.getElementById('fileZone').style.display = 'none';
      document.getElementById('btnDl').disabled = false;

      toast(`✓ ${filas.length} clientes cargados`, 'ok');
      setTimeout(() => toast('Completa los 3 pasos'), 2400);
    } catch {
      toast('No se pudo leer el archivo Excel', 'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ═══════════════════════════════════════════════════════
   2 · Seleccionar tipo de visita
═══════════════════════════════════════════════════════ */
function elegirVisita(btn) {
  document.querySelectorAll('.tog').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  visitaSel = btn.dataset.val;
  checkForm();
}

/* ═══════════════════════════════════════════════════════
   3 · Capturar GPS
═══════════════════════════════════════════════════════ */
function capturarGPS() {
  if (!navigator.geolocation) {
    toast('GPS no disponible en este navegador', 'err');
    return;
  }

  const btn = document.getElementById('btnGps');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Obteniendo posición…';
  toast('Obteniendo ubicación GPS…', 'load');

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      gpsVal = `${lat},${lng}`;

      document.getElementById('gpsTxt').textContent = gpsVal;
      document.getElementById('gpsBox').classList.add('captured');

      btn.disabled = false;
      btn.innerHTML = '<span>🔄</span> Recapturar ubicación';
      toast('Ubicación capturada', 'ok');
      checkForm();
    },
    err => {
      btn.disabled = false;
      btn.innerHTML = '<span>📡</span> Capturar ubicación actual';
      const m = {
        1: 'Permiso denegado — activa ubicación en ajustes del navegador',
        2: 'No se pudo determinar la posición actual',
        3: 'Tiempo agotado — intenta de nuevo al aire libre',
      };
      toast(m[err.code] || 'Error al obtener GPS', 'err');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

/* ═══════════════════════════════════════════════════════
   Validar si el formulario está completo
═══════════════════════════════════════════════════════ */
function checkForm() {
  const idx = document.getElementById('selCliente').value;
  const ok  = idx !== '' && visitaSel !== '' && gpsVal !== '' && wb !== null;
  document.getElementById('btnGuardar').disabled = !ok;
}

/* ═══════════════════════════════════════════════════════
   BOTÓN 1 — Guardar Excel
   Actualiza los datos en el workbook en memoria
   y re-graba el archivo con el mismo nombre original.
═══════════════════════════════════════════════════════ */
function guardar() {
  const idx = parseInt(document.getElementById('selCliente').value);
  if (isNaN(idx)) return;

  // Escribir en la fila del cliente seleccionado
  filas[idx]['Visita al Cliente'] = visitaSel;
  filas[idx]['Ubicacion']         = gpsVal;
  const nombreCliente = filas[idx]['Nombre Cliente'];

  // Actualizar workbook en memoria con los datos nuevos
  wb.Sheets[wb.SheetNames[0]] = XLSX.utils.json_to_sheet(filas);

  // Guardar con el mismo nombre que se cargó originalmente
  XLSX.writeFile(wb, fileName);

  // Animación de éxito en el botón
  const btn = document.getElementById('btnGuardar');
  btn.textContent = '✓ Guardado';
  btn.classList.add('pop');
  setTimeout(() => {
    btn.textContent = '💾 Guardar Excel';
    btn.classList.remove('pop');
  }, 1700);

  // Agregar al historial visual
  hist.unshift({ n: nombreCliente, v: visitaSel, g: gpsVal });
  renderHist();

  // Reset del formulario
  visitaSel = ''; gpsVal = '';
  document.querySelectorAll('.tog').forEach(b => b.classList.remove('on'));
  document.getElementById('gpsTxt').textContent = 'Sin capturar';
  document.getElementById('gpsBox').classList.remove('captured');
  document.getElementById('selCliente').value = '';
  document.getElementById('btnGps').innerHTML = '<span>📡</span> Capturar ubicación actual';
  checkForm();

  toast(`Guardado: ${nombreCliente}`, 'ok');
  setTimeout(() => toast('Comparte el archivo por WhatsApp o correo'), 2300);
}

/* ═══════════════════════════════════════════════════════
   BOTÓN 2 — Descargar Excel
   Descarga el estado actual del workbook en memoria
   (puede haber cambios guardados previamente o no).
═══════════════════════════════════════════════════════ */
function descargar() {
  if (!wb) { toast('Primero carga un archivo Excel', 'err'); return; }
  XLSX.writeFile(wb, fileName);
  toast('Descargando ' + fileName + '…', 'load');
  setTimeout(() => toast('Revisa tu carpeta de descargas'), 1800);
}

/* ═══════════════════════════════════════════════════════
   Historial visual de la sesión
═══════════════════════════════════════════════════════ */
function renderHist() {
  const wrap = document.getElementById('histWrap');
  const list = document.getElementById('histList');
  wrap.style.display = '';
  list.innerHTML = '';
  hist.slice(0, 8).forEach(h => {
    const el = document.createElement('div');
    el.className = 'hist-row';
    el.innerHTML = `
      <div class="hist-name">${h.n}</div>
      <div class="hist-meta">
        <span class="badge">${h.v}</span>
        <span>📍 ${h.g}</span>
      </div>`;
    list.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   Service Worker (PWA offline)
═══════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('✓ SW registrado'))
      .catch(err => console.warn('SW error:', err));
  });
}
</script>
</body>
</html>
